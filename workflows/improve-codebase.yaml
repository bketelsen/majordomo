name: improve-codebase
description: Identify improvements in a codebase and implement the high-priority ones

steps:
  - id: identify
    agent: improver
    input:
      repo_path: "{{workflow.input.repo_path}}"
      focus: "{{workflow.input.focus}}"
      context: "{{workflow.input.context}}"

  - id: implement
    agent: developer
    depends_on: identify
    iterate_over: "{{steps.identify.output.improvements}}"
    input:
      task: |
        Make the following code change in /home/bjk/projects/sionapi.
        
        IMPORTANT: This is a code change task, not a planning task.
        Use edit/write/bash tools to implement the change directly.
        Do NOT write documentation or plans.
        Verify with: cd packages/agent && bun x tsc --noEmit
        Commit when done with message: "{{item.title}}"
        
        Title: {{item.title}}
        Category: {{item.category}}
        Priority: {{item.priority}}
        
        {{item.body}}

on_complete:
  notify: true
