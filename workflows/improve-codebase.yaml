name: improve-codebase
description: Identify improvements in a codebase and implement the top ones

steps:
  - id: identify
    agent: improver
    input:
      repo_path: "{{workflow.input.repo_path}}"
      focus: "{{workflow.input.focus}}"
      context: "{{workflow.input.context}}"

  - id: implement
    agent: developer
    depends_on: identify
    input:
      task: "Implement the following code improvements in the repository. Make the actual code changes — do not write documentation or plans. For each improvement: read the relevant files, make the changes, verify with bun x tsc --noEmit if TypeScript. Commit each improvement separately with a descriptive message. Here are the improvements to implement:\n\n{{steps.identify.output}}"
